complexity:
  active: true
  LongParameterList:
    active: true
    allowedFunctionParameters: 8
    allowedConstructorParameters: 8
  TooManyFunctions:
    active: false
  ComplexCondition:
    allowedConditions: 4
  LongMethod:
    allowedLines: 70

style:
  active: true
  MagicNumber:
    active: false # re-enable in Step 3 after extracting constants
  WildcardImport:
    active: true
  MaxLineLength:
    maxLineLength: 140
  ForbiddenComment:
    active: true
    comments: ['TODO:', 'FIXME:']
  UnusedPrivateFunction:
    active: true
  UnusedPrivateProperty:
    active: true
  FunctionOnlyReturningConstant:
    active: false

empty-blocks:
  EmptyFunctionBlock:
    active: true
    ignoreOverridden: true

potential-bugs:
  active: true
  ImplicitDefaultLocale: { active: true }
  UnsafeCallOnNullableType: { active: true }
