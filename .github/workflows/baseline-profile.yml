name: Baseline Profile

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 1 */3 *' # quarterly: Jan/Apr/Jul/Oct 1st at 03:00 UTC

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Generate baseline profile
        run: |
          chmod +x ./gradlew
          ./gradlew :app:generateBaselineProfile \
            -Pandroid.testoptions.manageddevices.emulator.gpu=swiftshader_indirect --stacktrace
        env:
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          GH_ACCESS_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
      - name: Upload baseline profile
        uses: actions/upload-artifact@v7
        with:
          name: baseline-profile
          path: app/src/release/generated/baselineProfiles/baseline-prof.txt
